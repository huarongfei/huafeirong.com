# Huafeirong Studio — MyWeb nginx 生产部署配置
#
# 部署步骤：
#   1. sudo cp nginx.conf /etc/nginx/sites-available/huafeirong
#   2. sudo ln -s /etc/nginx/sites-available/huafeirong /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. certbot --nginx -d huafeirong.com -d www.huafeirong.com
#
# 静态文件路径：/var/www/huafeirong/

server {
    listen 80;
    listen [::]:80;
    server_name huafeirong.com www.huafeirong.com;

    # HTTP -> HTTPS 重定向（初次部署注释掉，Let's Encrypt 签发后取消注释）
    # return 301 https://$host$request_uri;

    root /var/www/huafeirong;
    index index.html;

    charset utf-8;

    # ============================================================
    # Gzip 压缩
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ============================================================
    # 安全头
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # CSP — 允许本站 + Formspree + Google Fonts + 内联样式
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline'; "
        "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
        "font-src 'self' https://fonts.gstatic.com; "
        "img-src 'self' data:; "
        "connect-src 'self' https://formspree.io; "
        "form-action 'self' https://formspree.io; "
        "frame-ancestors 'self'; "
        "base-uri 'self'; "
        "manifest-src 'self';"
        always;

    # ============================================================
    # 缓存策略
    # ============================================================
    # 静态资源 — 长期缓存（带版本哈希）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Sitemap & RSS
    location ~* ^/(sitemap\.xml|atom\.xml)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # HTML — 不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Service Worker — 不缓存
    location = /service-worker.js {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ============================================================
    # 安全：拒绝隐藏文件
    # ============================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ============================================================
    # 404 页面
    # ============================================================
    error_page 404 /404.html;

    # ============================================================
    # SPA 回退（如果需要）
    # ============================================================
    # try_files $uri $uri/ /index.html;
}

