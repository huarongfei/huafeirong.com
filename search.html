    // === Search Engine ===
    function tokenize(text) {
      return text.toLowerCase()
        .replace(/[，。！？、；：""''《》【】（）\s]+/g, ' ')
        .split(' ')
        .filter(t => t.length > 0);
    }

    function search(query) {
      const q = query.toLowerCase().trim();
      if (!q) return [];

      const qTokens = tokenize(q);
      const results = [];

      for (const page of searchIndex) {
        const contentTokens = tokenize(page.content);
        const titleTokens = tokenize(page.title);
        const tagTokens = page.tags.map(t => t.toLowerCase());
        const allTokens = [...titleTokens, ...tagTokens, ...contentTokens];

        // Count matching tokens (fuzzy: substring match counts too)
        let score = 0;
        const matchedTerms = new Set();

        for (const qt of qTokens) {
          // Title match (highest weight)
          for (const tt of titleTokens) {
            if (tt.includes(qt) || qt.includes(tt)) {
              score += 5;
              matchedTerms.add(qt);
            }
          }
          // Tag match
          for (const tg of tagTokens) {
            if (tg.includes(qt) || qt.includes(tg)) {
              score += 3;
              matchedTerms.add(qt);
            }
          }
          // Content match
          for (const ct of contentTokens) {
            if (ct.includes(qt) || qt.includes(ct)) {
              score += 1;
              matchedTerms.add(qt);
            }
          }
        }

        if (score > 0) {
          // Generate snippet
          let snippet = page.content;
          const firstMatch = qTokens.find(t => {
            // Find best matching sentence
            const idx = snippet.toLowerCase().indexOf(t);
            if (idx >= 0) {
              const start = Math.max(0, idx - 30);
              const end = Math.min(snippet.length, idx + t.length + 60);
              snippet = (start > 0 ? '…' : '') + snippet.slice(start, end) + (end < snippet.length ? '…' : '');
              return true;
            }
            return false;
          });
          if (!firstMatch) snippet = page.content.slice(0, 120) + '…';

          // Highlight
          qTokens.forEach(t => {
            const re = new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            snippet = snippet.replace(re, '<mark>$1</mark>');
          });

          results.push({
            title: page.title,
            url: page.url,
            tags: page.tags,
            snippet,
            score
          });
        }
      }

      results.sort((a, b) => b.score - a.score);
      return results;
    }

    function renderResults(results, query) {
      const statsEl = document.getElementById('resultsStats');
      const listEl = document.getElementById('resultsList');

      if (!query) {
        statsEl.style.display = 'none';
        listEl.innerHTML = '';
        return;
      }

      statsEl.style.display = 'block';
      statsEl.textContent = `找到 ${results.length} 条结果，搜索 "${query}"`;

      if (results.length === 0) {
        listEl.innerHTML = `
          <div class="no-results">
            <div class="icon">🔍</div>
            <p>没有找到与 "${query}" 相关的结果</p>
            <p class="hint">试试更简短的关键词，或使用不同表述</p>
          </div>`;
        return;
      }

      listEl.innerHTML = results.map(r => `
        <a href="${r.url}" class="result-item">
          <div class="result-title">${r.title}</div>
          <div class="result-url">huafeirong.com/${r.url}</div>
          <div class="result-snippet">${r.snippet}</div>
          <div class="result-tags">${r.tags.map(t => `<span class="result-tag">${t}</span>`).join('')}</div>
        </a>
      `).join('');
    }

    function doSearch(e) {
      e.preventDefault();
      const query = document.getElementById('searchBox').value.trim();
      const results = search(query);

      // Update URL without reload
      const url = new URL(window.location);
      if (query) {
        url.searchParams.set('q', query);
      } else {
        url.searchParams.delete('q');
      }
      window.history.replaceState({}, '', url);

      renderResults(results, query);
    }

    // On page load, check URL for pre-filled query
    (function() {
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q');
      if (q) {
        document.getElementById('searchBox').value = q;
        const results = search(q);
        renderResults(results, q);
      }
    })();
  </script>
