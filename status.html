  <style>
    .status-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem;
      min-height: calc(100vh - 70px);
    }
    .status-header {
      margin-bottom: 2.5rem;
      text-align: center;
    }
    .status-header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text-primary, #fff);
      margin-bottom: 0.5rem;
    }
    .status-header .subtitle {
      color: var(--text-secondary, #a0a0b0);
      font-size: 0.95rem;
    }
    .status-header .updated {
      font-size: 0.8rem;
      color: var(--text-secondary, #a0a0b0);
      opacity: 0.6;
      margin-top: 0.25rem;
    }

    /* Summary bar */
    .summary-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .summary-card {
      padding: 1rem 1.5rem;
      background: var(--bg-card, #1a1a2e);
      border: 1px solid var(--border-color, #2a2a3a);
      border-radius: 12px;
      text-align: center;
      min-width: 120px;
    }
    .summary-card .num {
      font-size: 2rem;
      font-weight: 800;
    }
    .summary-card .label {
      font-size: 0.8rem;
      color: var(--text-secondary, #a0a0b0);
      margin-top: 0.25rem;
    }
    .num.pass { color: #4ade80; }
    .num.warn { color: #fbbf24; }
    .num.fail { color: #f87171; }

    /* Project card */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
      gap: 1.5rem;
    }
    .project-card {
      background: var(--bg-card, #1a1a2e);
      border: 1px solid var(--border-color, #2a2a3a);
      border-radius: 14px;
      padding: 1.75rem;
      transition: border-color 0.2s, transform 0.15s;
    }
    .project-card:hover {
      border-color: var(--accent, #6c63ff);
      transform: translateY(-2px);
    }
    .pc-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .pc-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary, #fff);
    }
    .pc-version {
      font-size: 0.8rem;
      color: var(--text-secondary, #a0a0b0);
      background: rgba(108, 99, 255, 0.1);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-family: monospace;
    }
    .pc-desc {
      font-size: 0.9rem;
      color: var(--text-secondary, #a0a0b0);
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    /* Metrics */
    .pc-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .metric {
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      text-align: center;
    }
    .metric .m-value {
      font-size: 1.3rem;
      font-weight: 700;
    }
    .metric .m-label {
      font-size: 0.72rem;
      color: var(--text-secondary, #a0a0b0);
      margin-top: 0.15rem;
    }
    .m-build-pass { color: #4ade80; }
    .m-build-warn { color: #fbbf24; }
    .m-build-fail { color: #f87171; }
    .m-build-na   { color: var(--text-secondary, #a0a0b0); }

    /* Tech tags */
    .pc-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }
    .tech-tag {
      font-size: 0.72rem;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      background: rgba(108, 99, 255, 0.12);
      color: #a5b4fc;
      font-family: monospace;
    }

    /* Status bar */
    .pc-status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid var(--border-color, #2a2a3a);
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.green { background: #4ade80; box-shadow: 0 0 8px rgba(74, 222, 128, 0.5); }
    .status-dot.yellow { background: #fbbf24; box-shadow: 0 0 8px rgba(251, 191, 36, 0.5); }
    .status-dot.red { background: #f87171; box-shadow: 0 0 8px rgba(248, 113, 113, 0.5); }
    .status-dot.gray { background: #6b7280; }
    .pc-link {
      font-size: 0.85rem;
      color: var(--accent, #6c63ff);
      text-decoration: none;
      font-weight: 500;
    }
    .pc-link:hover { text-decoration: underline; }

    /* Light theme */
    [data-theme="light"] .status-header h1 { color: #1a1a2e; }
    [data-theme="light"] .project-card { background: #fff; border-color: #e8e8f0; }
    [data-theme="light"] .metric { background: #f5f5fa; }
    [data-theme="light"] .pc-name { color: #1a1a2e; }
    [data-theme="light"] .pc-desc { color: #555; }
    [data-theme="light"] .summary-card { background: #fff; border-color: #e8e8f0; }

    @media (max-width: 600px) {
      .status-page { padding: 1.5rem 1rem; }
      .status-header h1 { font-size: 1.6rem; }
      .project-grid { grid-template-columns: 1fr; }
      .pc-metrics { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>

    function renderStatusBadge(status) {
      const map = {
        pass: '<span class="status-dot green"></span>',
        warn: '<span class="status-dot yellow"></span>',
        fail: '<span class="status-dot red"></span>',
        na:   '<span class="status-dot gray"></span>',
      };
      return map[status] || map.na;
    }

    function renderProjects() {
      const grid = document.getElementById('projectGrid');
      grid.innerHTML = projects.map(p => {
        const featuresHtml = p.features.map(f =>
          `<span style="display:inline-flex;align-items:center;gap:0.2rem;font-size:0.75rem;color:var(--text-secondary);">
            <span style="color:${f.done ? '#4ade80' : '#6b7280'};">${f.done ? '✓' : '○'}</span>${f.label}
          </span>`
        ).join(' ');

        return `
          <div class="project-card">
            <div class="pc-header">
              <div class="pc-name">${p.name}</div>
              <div class="pc-version">${p.version}</div>
            </div>
            <p class="pc-desc">${p.desc}</p>

            <div class="pc-metrics">
              <div class="metric">
                <div class="m-value m-build-${p.buildStatus}">${renderStatusBadge(p.buildStatus)} ${p.buildStatus === 'pass' ? '✓' : ''}</div>
                <div class="m-label">构建：${p.buildLabel}</div>
              </div>
              <div class="metric">
                <div class="m-value m-build-${p.testStatus}">${renderStatusBadge(p.testStatus)} ${p.testStatus === 'pass' ? p.testLabel : ''}</div>
                <div class="m-label">测试：${p.coverage}</div>
              </div>
              <div class="metric">
                <div class="m-value m-build-${p.releaseStatus}">${renderStatusBadge(p.releaseStatus)}</div>
                <div class="m-label">发布：${p.releaseLabel}</div>
              </div>
            </div>

            <div class="pc-tech">
              ${p.tech.map(t => `<span class="tech-tag">${t}</span>`).join('')}
            </div>

            <div style="font-size:0.75rem;margin-bottom:1rem;display:flex;flex-wrap:wrap;gap:0.5rem 1rem;">
              ${featuresHtml}
            </div>

            <div class="pc-status-bar">
              <span class="status-badge">
                ${renderStatusBadge(p.buildStatus)}
                构建${p.buildStatus === 'pass' ? '通过' : p.buildStatus === 'warn' ? '警告' : '失败'}
              </span>
              ${p.link ? `<a href="${p.link}" class="pc-link">查看详情 →</a>` : `<a href="portfolio.html" class="pc-link">作品集 →</a>`}
            </div>
          </div>
        `;
      }).join('');
    }

    // Update timestamp
    document.getElementById('lastUpdated').textContent =
      `最后更新：${new Date().toISOString().replace('T',' ').slice(0,16)} CST`;

    renderProjects();
  </script>
